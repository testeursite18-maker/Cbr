version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    environment:
      - DEBUG=false
      - SECRET_KEY=change-this-in-production
      - DATABASE_URL=sqlite+aiosqlite:///./saas_platform.db
      - ENCRYPTION_KEY=your-32-byte-encryption-key!!
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

